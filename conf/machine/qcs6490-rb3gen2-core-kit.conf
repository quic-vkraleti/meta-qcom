#@TYPE: Machine
#@NAME: Qualcomm RB3Gen2 Development Kit (Core Kit)
#@DESCRIPTION: Machine configuration for Qualcomm RB3Gen2 development Kit, with QCS6490

require conf/machine/include/qcom-qcs6490.inc

MACHINE_FEATURES += "efi pci"

KERNEL_DEVICETREE ?= " \
                      qcom/qcs6490-rb3gen2.dtb \
                      "

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS += " \
    packagegroup-rb3gen2-firmware \
    packagegroup-rb3gen2-hexagon-dsp-binaries \
"

#
# Configuration variables for linux-qcom-staging kernel
#

# These addon DTs are not yet upstreamed. Build them only in staging kernel
# to avoid conflicts with other kernel providers like linux-yocto-dev.
KERNEL_DEVICETREE:append:pn-linux-qcom-staging = " \
                      qcom/qcs6490-addons-rb3gen2.dtb \
                      qcom/qcs6490-addons-rb3gen2-vision-mezz.dtb \
                      "

# Out Of Tree dtbo to overlay
KERNEL_DTB_OVERLAYS[qcs6490-addons-rb3gen2] = " \
                      qcm6490-video.dtbo \
                      "

KERNEL_DTB_OVERLAYS[qcs6490-addons-rb3gen2-vision-mezz] = " \
                      qcm6490-video.dtbo \
                      "

# Recipe providers of above dtbo files.
KERNEL_DTBO_PROVIDERS:pn-linux-qcom-staging = " \
                      qcom-videodtb \
                      "
